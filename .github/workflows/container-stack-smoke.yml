name: Container Stack Smoke

on:
  pull_request:
    paths:
      - ".github/workflows/container-stack-smoke.yml"
      - "docker-compose.yml"
      - "docker/**"
      - "scripts/deploy/**"
      - "tests/scripts/test_container_stack_contract.py"
      - ".env.example"
      - "docs/deployment/containerized.md"
  push:
    branches:
      - wcq
      - "feat/**"
      - "fix/**"
    paths:
      - ".github/workflows/container-stack-smoke.yml"
      - "docker-compose.yml"
      - "docker/**"
      - "scripts/deploy/**"
      - "tests/scripts/test_container_stack_contract.py"
      - ".env.example"
      - "docs/deployment/containerized.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-hosted:
    name: Smoke on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            prepare_env: cp .env.example .env
          - os: windows-2025
            prepare_env: Copy-Item .env.example .env -Force

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare .env
        run: ${{ matrix.prepare_env }}

      - name: Check Docker availability
        run: |
          docker version
          docker compose version

      - name: Check Windows Docker server platform
        if: runner.os == 'Windows'
        run: |
          $dockerServerPlatform = docker version --format '{{.Server.Os}}/{{.Server.Arch}}'
          if ($dockerServerPlatform -ne 'linux/amd64') {
            Write-Error "Expected Docker server platform linux/amd64 but found $dockerServerPlatform"
            exit 1
          }

      - name: Resolve compose configuration
        run: docker compose config

      - name: Start container stack
        if: runner.os != 'Windows'
        run: bash scripts/deploy/start_container_stack.sh

      - name: Start container stack
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File scripts/deploy/start_container_stack.ps1

      - name: Run smoke checks
        if: runner.os != 'Windows'
        run: bash scripts/deploy/smoke_test_container_stack.sh

      - name: Run smoke checks
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File scripts/deploy/smoke_test_container_stack.ps1

      - name: Tear down container stack
        if: always() && runner.os != 'Windows'
        run: bash scripts/deploy/stop_container_stack.sh

      - name: Tear down container stack
        if: always() && runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File scripts/deploy/stop_container_stack.ps1

  smoke-macos:
    name: Smoke on macOS self-hosted
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, macOS, container-smoke]
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare .env
        run: cp .env.example .env

      - name: Check Docker availability
        run: |
          docker version
          docker compose version

      - name: Resolve compose configuration
        run: docker compose config

      - name: Start container stack
        run: bash scripts/deploy/start_container_stack.sh

      - name: Run smoke checks
        run: bash scripts/deploy/smoke_test_container_stack.sh

      - name: Tear down container stack
        if: always()
        run: bash scripts/deploy/stop_container_stack.sh
